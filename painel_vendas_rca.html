<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Painel de Vendas por RCA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F0F2F5;color:#1A1A2E;min-height:100vh}

/* HEADER */
header{background:#1A1A2E;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
header h1{font-size:17px;font-weight:600;color:#fff;display:flex;align-items:center;gap:10px}
header h1 span{background:#3B82F6;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.hdr-total{font-size:12px;color:#9CA3AF}
.hdr-total strong{color:#fff;font-size:15px}

/* FILTROS */
.filtros-bar{background:#fff;border-bottom:1px solid #E5E7EB;padding:12px 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.filtros-bar label{font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;display:flex;flex-direction:column;gap:4px;min-width:180px}
.filtros-bar select{font-size:13px;padding:7px 10px;border-radius:7px;border:1px solid #E5E7EB;background:#F9FAFB;color:#1A1A2E;cursor:pointer}
.filtros-bar select:focus{outline:none;border-color:#3B82F6}
.toggle-wrap{display:flex;flex-direction:column;gap:4px}
.toggle-wrap span{font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.5px}
.toggle{display:flex;border:1px solid #E5E7EB;border-radius:7px;overflow:hidden}
.toggle button{padding:7px 16px;font-size:13px;font-weight:500;border:none;background:#F9FAFB;color:#6B7280;cursor:pointer;transition:.15s}
.toggle button.on{background:#1A1A2E;color:#fff}
.btn-limpar{padding:7px 14px;font-size:12px;border-radius:7px;border:1px solid #E5E7EB;background:#fff;color:#6B7280;cursor:pointer;margin-left:auto;align-self:flex-end}
.btn-limpar:hover{background:#F3F4F6}

/* CARDS TOTAIS */
.cards-totais{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 24px}
.card-t{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #E5E7EB}
.card-t-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#9CA3AF;margin-bottom:4px}
.card-t-val{font-size:22px;font-weight:700;color:#1A1A2E}
.card-t-sub{font-size:11px;color:#9CA3AF;margin-top:2px}

/* CONTEÚDO */
.content{padding:0 24px 24px}
.section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#6B7280;margin-bottom:10px}

/* GRID RCA */
.rca-grid{display:flex;flex-direction:column;gap:12px}
.rca-card{background:#fff;border-radius:10px;border:1px solid #E5E7EB;overflow:hidden}
.rca-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#F8FAFC;border-bottom:1px solid #F1F5F9;cursor:pointer;user-select:none;gap:12px;flex-wrap:wrap}
.rca-nome{font-size:14px;font-weight:600;color:#1A1A2E;flex:1}
.rca-stats{display:flex;gap:16px;align-items:center}
.rca-stat{text-align:right}
.rca-stat-lbl{font-size:10px;color:#9CA3AF;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.rca-stat-val{font-size:15px;font-weight:700;color:#1A1A2E}
.rca-stat-val.verde{color:#059669}
.rca-chevron{font-size:14px;color:#9CA3AF;transition:.2s;flex-shrink:0}
.rca-chevron.open{transform:rotate(180deg)}

/* BARRA DE PROGRESSO DO RCA */
.rca-bar-wrap{padding:0 16px 10px;background:#F8FAFC;border-bottom:1px solid #F1F5F9}
.rca-bar-bg{height:5px;background:#E5E7EB;border-radius:3px}
.rca-bar-fill{height:5px;border-radius:3px;background:#3B82F6;transition:.4s}

/* TABELA INTERNA */
.rca-body{display:none;padding:0}
.rca-body.open{display:block}
.rca-tbl{width:100%;border-collapse:collapse;font-size:12px}
.rca-tbl th{text-align:left;font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.4px;padding:8px 16px;border-bottom:1px solid #F1F5F9;white-space:nowrap;background:#FAFAFA;cursor:pointer}
.rca-tbl th.num{text-align:right}
.rca-tbl td{padding:8px 16px;border-bottom:1px solid #F9FAFB;color:#374151;vertical-align:middle}
.rca-tbl td.num{text-align:right;font-weight:600}
.rca-tbl tr:last-child td{border-bottom:none}
.rca-tbl tr:hover td{background:#F9FAFB}
.secao-pill{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.bar-mini{display:inline-block;height:5px;border-radius:3px;background:#3B82F6;margin-left:6px;vertical-align:middle;opacity:.7}
.pct-txt{font-size:10px;color:#9CA3AF;margin-left:4px}
.cli-count{font-size:10px;color:#9CA3AF;font-weight:400}

/* CLIENTES EXPANDIDOS */
.cli-sub{display:none;background:#F9FAFB}
.cli-sub.open{display:table-row-group}
.cli-sub td{font-size:11px;padding:5px 16px 5px 36px;color:#6B7280;border-bottom:1px solid #F1F5F9}
.cli-sub tr:last-child td{border-bottom:none}

/* CORES POR SEÇÃO */
.s0{background:#DBEAFE;color:#1D4ED8}
.s1{background:#D1FAE5;color:#065F46}
.s2{background:#FEF3C7;color:#92400E}
.s3{background:#EDE9FE;color:#5B21B6}
.s4{background:#FEE2E2;color:#991B1B}
.s5{background:#FCE7F3;color:#9D174D}
.s6{background:#F3F4F6;color:#374151}
.s7{background:#E0F2FE;color:#0369A1}
.s8{background:#F0FDF4;color:#15803D}
.s9{background:#FFFBEB;color:#B45309}
.s10{background:#FDF4FF;color:#7E22CE}
.s11{background:#FFF7ED;color:#C2410C}
.s12{background:#F0FDFA;color:#0F766E}
.s13{background:#FEF9C3;color:#713F12}

.empty{text-align:center;padding:40px;color:#9CA3AF;font-size:13px;grid-column:1/-1}
.sortable:hover{color:#374151}
.sort-ico{opacity:.5;font-size:9px;margin-left:3px}

@media(max-width:700px){
  .cards-totais{grid-template-columns:repeat(2,1fr)}
  .rca-stats{gap:10px}
  .filtros-bar{padding:12px 16px}
  .content,.cards-totais{padding-left:16px;padding-right:16px}
}
</style>
</head>

<header>
  <h1>📊 Vendas por RCA <span id="hdr-periodo">Junho/2026</span></h1>

  <label id="lbl-periodo" style="display:none">Data

</div>

<div class="content">

</div>

// ─── Estado ──────────────────────────────────────────────
let modo = 'mes'; // 'mes' ou 'dia'
const SECAO_CORES = {};
let _coreIdx = 0;
function corSecao(s){
  if(!SECAO_CORES[s]) SECAO_CORES[s]='s'+(_coreIdx++%14);
  return SECAO_CORES[s];
}

// ─── Init ─────────────────────────────────────────────────
(function init(){
  // Deptos
  const deptos = [...new Set(DATA.map(d=>d.depto).filter(Boolean))].sort();
  const selD = document.getElementById('selDepto');
  deptos.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;selD.appendChild(o);});

  // Periodos
  buildPeriodOptions();
  render();
})();

function buildPeriodOptions(){
  const modo_ = modo;
  const key = modo_==='mes'?'mes':'dia';
  const vals = [...new Set(DATA.map(d=>d[key]).filter(Boolean))].sort();
  const sel = document.getElementById('selPeriodo');
  const cur = sel.value;
  sel.innerHTML = '<option value="">'+( modo_==='mes'?'Todos os meses':'Todos os dias')+'</option>';
  vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;if(v===cur)o.selected=true;sel.appendChild(o);});
}

function setModo(m){
  modo = m;
  document.getElementById('btnMes').className = m==='mes'?'on':'';
  document.getElementById('btnDia').className = m==='dia'?'on':'';
  document.getElementById('lbl-periodo').style.display = 'flex';
  buildPeriodOptions();
  render();
}

function limpar(){
  document.getElementById('selDepto').value='';
  document.getElementById('selPeriodo').value='';
  render();
}

// ─── Filtrar ──────────────────────────────────────────────
function getFiltrado(){
  const depto = document.getElementById('selDepto').value;
  const periodo = document.getElementById('selPeriodo').value;
  const key = modo==='mes'?'mes':'dia';
  return DATA.filter(d=>{
    if(depto && d.depto!==depto) return false;
    if(periodo && d[key]!==periodo) return false;
    return true;
  });
}

// ─── Formatos ────────────────────────────────────────────
function fmtR(v){
  if(v>=1e6) return 'R$ '+(v/1e6).toFixed(2)+'M';
  if(v>=1e3) return 'R$ '+(v/1e3).toFixed(1)+'k';
  return 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtFull(v){return 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}

// ─── Render principal ─────────────────────────────────────
function render(){
  const data = getFiltrado();
  const depto = document.getElementById('selDepto').value;
  const periodo = document.getElementById('selPeriodo').value;

  // Header período
  const key = modo==='mes'?'mes':'dia';
  const pLabel = periodo || (modo==='mes'?'Todos os meses':'Todos os dias');
  document.getElementById('hdr-periodo').textContent = pLabel;

  // Cards totais
  const totVal = data.reduce((s,d)=>s+d.valor,0);
  const totQtd = data.reduce((s,d)=>s+d.qt,0);
  const rcas = new Set(data.map(d=>d.rca).filter(Boolean));
  const clis = new Set(data.map(d=>d.codcli).filter(Boolean));
  document.getElementById('cTotal').textContent = fmtR(totVal);
  document.getElementById('cTotalSub').textContent = fmtFull(totVal);
  document.getElementById('cQtd').textContent = totQtd.toLocaleString('pt-BR');
  document.getElementById('cQtdSub').textContent = 'unidades vendidas';
  document.getElementById('cRca').textContent = rcas.size;
  document.getElementById('cRcaSub').textContent = 'vendedores com venda';
  document.getElementById('cCli').textContent = clis.size;
  document.getElementById('cCliSub').textContent = 'clientes únicos';
  document.getElementById('hdr-val').textContent = fmtFull(totVal);

  // Section title
  let st = 'Resultado por RCA';
  if(depto) st += ' · '+depto;
  if(periodo) st += ' · '+periodo;
  document.getElementById('secTitle').textContent = st;

  // Agrupar por RCA
  const porRca = {};
  data.forEach(d=>{
    const r = d.rca || 'SEM RCA';
    if(!porRca[r]) porRca[r]={rca:r,valor:0,qt:0,clis:new Set(),secoes:{}};
    porRca[r].valor += d.valor;
    porRca[r].qt += d.qt;
    porRca[r].clis.add(d.codcli);
    const sec = d.secao || d.depto || 'OUTROS';
    if(!porRca[r].secoes[sec]) porRca[r].secoes[sec]={valor:0,qt:0,clis:new Set(),produtos:{}};
    porRca[r].secoes[sec].valor += d.valor;
    porRca[r].secoes[sec].qt += d.qt;
    porRca[r].secoes[sec].clis.add(d.codcli);
    const prod = d.produto;
    if(!porRca[r].secoes[sec].produtos[prod]) porRca[r].secoes[sec].produtos[prod]={valor:0,qt:0,clis:new Set()};
    porRca[r].secoes[sec].produtos[prod].valor += d.valor;
    porRca[r].secoes[sec].produtos[prod].qt += d.qt;
    porRca[r].secoes[sec].produtos[prod].clis.add(d.codcli);
  });

  const rcaList = Object.values(porRca).sort((a,b)=>b.valor-a.valor);
  const maxValRca = rcaList.length ? rcaList[0].valor : 1;

  const grid = document.getElementById('rcaGrid');
  if(!rcaList.length){
    grid.innerHTML='<div class="empty">Nenhum dado encontrado para os filtros selecionados.</div>';
    return;
  }

  grid.innerHTML = rcaList.map((rca,idx)=>{
    const pct = Math.round(rca.valor/totVal*100);
    const barW = Math.round(rca.valor/maxValRca*100);
    const secList = Object.entries(rca.secoes).sort((a,b)=>b[1].valor-a[1].valor);

    // Linhas de seção
    const secRows = secList.map(([sec,sv])=>{
      const pctSec = rca.valor>0?Math.round(sv.valor/rca.valor*100):0;
      const barPx = Math.round(pctSec*1.2);
      const cor = corSecao(sec);
      return `<tr>
        <td><span class="secao-pill ${cor}">${sec}</span></td>
        <td class="num">${sv.qt.toLocaleString('pt-BR')}</td>
        <td class="num">
          ${fmtFull(sv.valor)}
          <span class="bar-mini" style="width:${barPx}px"></span>
          <span class="pct-txt">${pctSec}%</span>
        </td>
        <td class="num"><span class="cli-count">${sv.clis.size} cli</span></td>
      </tr>`;
    }).join('');

    // Linha de total
    const totalRow = `<tr style="background:#F8FAFC;font-weight:700">
      <td style="font-size:11px;color:#6B7280">TOTAL</td>
      <td class="num">${rca.qt.toLocaleString('pt-BR')}</td>
      <td class="num" style="color:#1A1A2E">${fmtFull(rca.valor)}</td>
      <td class="num"><span class="cli-count">${rca.clis.size} cli</span></td>
    </tr>`;

    const rcaNome = rca.rca.replace(' - RCA SUPERVISOR','').replace(' - BAHIA FORT','').replace(' DE REZENDE','');

    return `<div class="rca-card">
      <div class="rca-header" onclick="toggleRca(${idx})">
        <div class="rca-nome">👤 ${rcaNome}</div>
        <div class="rca-stats">
          <div class="rca-stat">
            <div class="rca-stat-lbl">Qtd</div>
            <div class="rca-stat-val">${rca.qt.toLocaleString('pt-BR')}</div>
          </div>
          <div class="rca-stat">
            <div class="rca-stat-lbl">Clientes</div>
            <div class="rca-stat-val">${rca.clis.size}</div>
          </div>
          <div class="rca-stat">
            <div class="rca-stat-lbl">Total vendido</div>
            <div class="rca-stat-val verde">${fmtFull(rca.valor)}</div>
          </div>
          <div class="rca-stat">
            <div class="rca-stat-lbl">Part. %</div>
            <div class="rca-stat-val">${pct}%</div>
          </div>
        </div>
        <div class="rca-chevron" id="chev${idx}">▼</div>
      </div>
      <div class="rca-bar-wrap">
        <div class="rca-bar-bg"><div class="rca-bar-fill" style="width:${barW}%"></div></div>
      </div>
      <div class="rca-body" id="body${idx}">
        <table class="rca-tbl">
          <thead>
            <tr>
              <th>Seção / Categoria</th>
              <th class="num">Qtd</th>
              <th class="num">Valor</th>
              <th class="num">Clientes</th>
            </tr>
          </thead>
          <tbody>${secRows}${totalRow}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}

function toggleRca(idx){
  const body = document.getElementById('body'+idx);
  const chev = document.getElementById('chev'+idx);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
}

// Mostrar seletor de período ao carregar
document.getElementById('lbl-periodo').style.display='flex';
