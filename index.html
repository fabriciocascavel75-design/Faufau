header{background:#fff;border-bottom:1px solid #E5E7EB;padding:14px 24px;display:flex;align-items:center;gap:14px}

.tbl-wrap{background:#fff;border:1px solid #E5E7EB;border-radius:10px;overflow:hidden}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#F9FAFB;text-align:left;font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;border-bottom:1px solid #E5E7EB;white-space:nowrap;cursor:pointer;user-select:none}

.sku-pills{display:flex;flex-wrap:wrap;gap:3px;min-width:120px}
