<!DOCTYPE html>

<title>Painel Último Pedido — Fornecedores</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F2F5;color:#1A1A2E;min-height:100vh}
header{background:#1A1A2E;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
header h1{font-size:17px;font-weight:600;color:#fff;display:flex;align-items:center;gap:10px}
header h1 em{background:#3B82F6;color:#fff;font-size:11px;font-style:normal;font-weight:600;padding:3px 10px;border-radius:20px}
.hdr-info{font-size:12px;color:#9CA3AF}.hdr-info strong{color:#fff}
.filtros-bar{background:#fff;border-bottom:1px solid #E5E7EB;padding:12px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.filtros-bar label{font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;display:flex;flex-direction:column;gap:4px;min-width:160px;flex:1}
.filtros-bar select,.filtros-bar input{font-size:13px;padding:7px 10px;border-radius:7px;border:1px solid #E5E7EB;background:#F9FAFB;color:#1A1A2E;width:100%}
.filtros-bar select:disabled{opacity:.4;cursor:not-allowed}
.filtros-bar select:focus,.filtros-bar input:focus{outline:none;border-color:#3B82F6}
.filtros-bar .btn-limpar{padding:7px 14px;font-size:12px;border-radius:7px;border:1px solid #E5E7EB;background:#fff;color:#6B7280;cursor:pointer;align-self:flex-end;white-space:nowrap;flex:none}
.filtros-bar .btn-limpar:hover{background:#F3F4F6}
.forn-tabs{display:flex;gap:8px;padding:14px 24px 0;flex-wrap:wrap}
.tab{padding:7px 18px;border-radius:8px;border:1px solid #E5E7EB;background:#fff;color:#6B7280;font-size:13px;cursor:pointer;font-weight:500;transition:.15s}
.tab.active{background:#1A1A2E;color:#fff;border-color:#1A1A2E}
.rot-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;background:#EEF2FF;color:#3B82F6;border:1px solid #DBEAFE;padding:2px 10px;border-radius:20px;margin-left:8px;font-weight:600}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:14px 24px}
.card{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #E5E7EB}
.card-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#9CA3AF;margin-bottom:4px}
.card-val{font-size:22px;font-weight:700;color:#1A1A2E}
.card-sub{font-size:11px;color:#9CA3AF;margin-top:2px}
.content{padding:0 24px 24px}
.tbl-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.tbl-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#6B7280}
.tbl-count{font-size:12px;color:#6B7280;background:#F3F4F6;padding:3px 10px;border-radius:20px}
.tbl-wrap{background:#fff;border:1px solid #E5E7EB;border-radius:10px;overflow:hidden}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:800px}
th{background:#F9FAFB;text-align:left;font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.5px;padding:9px 12px;border-bottom:1px solid #E5E7EB;white-space:nowrap;cursor:pointer;user-select:none}
th.num,td.num{text-align:right}
td{padding:8px 12px;color:#374151;border-bottom:1px solid #F3F4F6;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAFA}
tr.in-rot td{background:#F0FDF4}
tr.in-rot:hover td{background:#DCFCE7}
.nome-cli{font-weight:500;color:#1A1A2E;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cod-cli{font-size:10px;color:#9CA3AF}
.rot-indicator{font-size:10px;color:#059669;font-weight:600}
.pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:100px;font-weight:600;white-space:nowrap}
.p-NEXGARD{background:#DBEAFE;color:#1D4ED8}
.p-NEXGARD-SPECTRA{background:#EDE9FE;color:#5B21B6}
.p-NEXGARD-COMBO{background:#D1FAE5;color:#065F46}
.p-FRONTLINE{background:#FEF3C7;color:#92400E}
.p-BIOLOGICOS{background:#DCFCE7;color:#14532D}
.p-TERAPEUTICOS{background:#FEE2E2;color:#991B1B}
.p-OUTROS{background:#F3F4F6;color:#374151}
.p-ANTIBIOTICOS{background:#DBEAFE;color:#1D4ED8}
.p-ANTI-INFLAMATORIOS{background:#FEF3C7;color:#92400E}
.p-ENDECTOCIDAS{background:#D1FAE5;color:#065F46}
.p-SUPLEMENTOS{background:#EDE9FE;color:#5B21B6}
.val-green{color:#059669;font-weight:600}
.val-amber{color:#D97706;font-weight:500}
.data-rot-badge{font-size:10px;background:#F0FDF4;color:#059669;border:1px solid #BBF7D0;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap}
.dia-badge{font-size:10px;background:#E0F2FE;color:#0369A1;padding:2px 6px;border-radius:20px;font-weight:600;margin-left:4px}
.empty{text-align:center;padding:40px;color:#9CA3AF;font-size:13px}
.sort-ico{opacity:.5;font-size:9px;margin-left:3px}
@media(max-width:700px){.cards{grid-template-columns:repeat(2,1fr)}.filtros-bar{padding:12px 16px}.content,.cards,.forn-tabs{padding-left:16px;padding-right:16px}}
</style>
</head>

real":11138.25,"equipe":"BAHIA FORT - RUDSLEY GLAUCO","rca":"JOAO VICTOR LARCEDA SANTOS","data_rot":"29/06/2026","dia_rot":"SEGUNDA","datas_rot":["29/06/2026"],"skus":{"ENDECTOCIDAS":{"pot":1032.0,"ult":1032.0,"ano":1032.0},"OUTROS":{"pot":842.4,"ult":842.4,"ano":842.4}}}];

const CATS = {
  '2422': ['NEXGARD','NEXGARD SPECTRA','NEXGARD COMBO','FRONTLINE','BIOLOGICOS','TERAPEUTICOS','OUTROS'],
  '3283': ['ANTIBIÓTICOS','ANTI-INFLAMATÓRIOS','ENDECTOCIDAS','SUPLEMENTOS','OUTROS']
};
const FORN_NAMES = {'2422':'BOEHRINGER 2422','3283':'CEVA 3283'};
let curForn = '2422';
let sortCol = 'pot_total', sortAsc = false;

function pillClass(cat){
  const m = {'NEXGARD':'p-NEXGARD','NEXGARD SPECTRA':'p-NEXGARD-SPECTRA','NEXGARD COMBO':'p-NEXGARD-COMBO',
    'FRONTLINE':'p-FRONTLINE','BIOLOGICOS':'p-BIOLOGICOS','TERAPEUTICOS':'p-TERAPEUTICOS','OUTROS':'p-OUTROS',
    'ANTIBIÓTICOS':'p-ANTIBIOTICOS','ANTI-INFLAMATÓRIOS':'p-ANTI-INFLAMATORIOS',
    'ENDECTOCIDAS':'p-ENDECTOCIDAS','SUPLEMENTOS':'p-SUPLEMENTOS'};
  return m[cat]||'p-OUTROS';
}
function fmt(v){
  if(v>=1e6)return 'R$ '+(v/1e6).toFixed(1)+'M';
  if(v>=1e3)return 'R$ '+(v/1e3).toFixed(0)+'k';
  return 'R$ '+v.toFixed(0);
}
function fmtFull(v){return 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function diasSem(d){const m={seg:'SEG',ter:'TER',qua:'QUA',qui:'QUI',sex:'SEX',sab:'SÁB',dom:'DOM'};return m[(d||'').toLowerCase()]||d;}

function setForn(f){
  curForn=f;
  document.getElementById('tab2422').className='tab'+(f==='2422'?' active':'');
  document.getElementById('tab3283').className='tab'+(f==='3283'?' active':'');
  document.getElementById('hdr-forn').textContent=FORN_NAMES[f];
  buildEquipes(); render();
}

function buildEquipes(){
  const data=ALL_DATA.filter(d=>d.forn===curForn&&d.equipe);
  const equipes=[...new Set(data.map(d=>d.equipe))].sort();
  const sel=document.getElementById('selEq');
  const cur=sel.value;
  sel.innerHTML='<option value="">Todas as equipes</option>';
  equipes.forEach(e=>{const o=document.createElement('option');o.value=e;o.textContent=e;if(e===cur)o.selected=true;sel.appendChild(o);});
  buildRcas(); buildDatas();
}

function onEq(){buildRcas();buildDatas();render();}
function onRca(){buildDatas();render();}

function buildRcas(){
  const eq=document.getElementById('selEq').value;
  const sel=document.getElementById('selRca');
  if(!eq){sel.innerHTML='<option value="">Todos os vendedores</option>';sel.disabled=true;return;}
  const rcas=[...new Set(ALL_DATA.filter(d=>d.forn===curForn&&d.equipe===eq&&d.rca).map(d=>d.rca))].sort();
  const cur=sel.value;
  sel.innerHTML='<option value="">Todos os vendedores</option>';
  rcas.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;if(r===cur)o.selected=true;sel.appendChild(o);});
  sel.disabled=false;
}

function buildDatas(){
  const eq=document.getElementById('selEq').value;
  const rca=document.getElementById('selRca').value;
  const base=ALL_DATA.filter(d=>{
    if(d.forn!==curForn)return false;
    if(eq&&d.equipe!==eq)return false;
    if(rca&&d.rca!==rca)return false;
    return d.data_rot;
  });
  const datas=[...new Set(base.map(d=>d.data_rot).filter(Boolean))].sort();
  const sel=document.getElementById('selDataRot');
  const cur=sel.value;
  sel.innerHTML='<option value="">Todas as datas</option>';
  datas.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;if(d===cur)o.selected=true;sel.appendChild(o);});
  sel.disabled=datas.length===0;
}

function limpar(){
  document.getElementById('selEq').value='';
  document.getElementById('selRca').innerHTML='<option value="">Todos os vendedores</option>';
  document.getElementById('selRca').disabled=true;
  document.getElementById('selDataRot').innerHTML='<option value="">Todas as datas</option>';
  document.getElementById('selDataRot').disabled=true;
  document.getElementById('busca').value='';
  buildEquipes(); render();
}

function getFiltered(){
  const eq=document.getElementById('selEq').value;
  const rca=document.getElementById('selRca').value;
  const dataRot=document.getElementById('selDataRot').value;
  const busca=(document.getElementById('busca').value||'').toLowerCase().trim();
  return ALL_DATA.filter(d=>{
    if(d.forn!==curForn)return false;
    if(eq&&d.equipe!==eq)return false;
    if(rca&&d.rca!==rca)return false;
    if(dataRot&&!(d.datas_rot||[]).includes(dataRot)&&d.data_rot!==dataRot)return false;
    if(busca&&!d.nome.toLowerCase().includes(busca)&&!d.cli.includes(busca))return false;
    return true;
  });
}

function calcUlt(d){return Object.values(d.skus).reduce((s,v)=>s+(v.ult||0),0);}
function calcAno(d){return Object.values(d.skus).reduce((s,v)=>s+(v.ano||0),0);}

function render(){
  const filtered=getFiltered();
  const eq=document.getElementById('selEq').value;
  const rca=document.getElementById('selRca').value;
  const dataRot=document.getElementById('selDataRot').value;
  const cats=CATS[curForn];

  // Cards
  const totPot=filtered.reduce((s,d)=>s+d.pot_real,0);
  const totUlt=filtered.reduce((s,d)=>s+calcUlt(d),0);
  const noRot=filtered.filter(d=>d.data_rot).length;

  document.getElementById('c1').textContent=filtered.length.toLocaleString('pt-BR');
  document.getElementById('cs1').textContent='clientes com histórico';
  document.getElementById('c2').textContent=noRot.toLocaleString('pt-BR');
  document.getElementById('cs2').textContent='clientes no roteiro'+(dataRot?' · '+dataRot:'');
  document.getElementById('c3').textContent=fmt(totPot);
  document.getElementById('cs3').textContent=fmtFull(totPot);
  document.getElementById('c4').textContent=fmt(totUlt);
  document.getElementById('cs4').textContent=fmtFull(totUlt);
  document.getElementById('hdr-val').textContent=fmtFull(totUlt);

  // Title
  let t=FORN_NAMES[curForn];
  if(eq)t+=' › '+eq.split(' - ').pop();
  if(rca)t+=' › '+rca.split(' ')[0];
  if(dataRot)t+=' · '+dataRot;
  document.getElementById('tblTitle').textContent=t;
  document.getElementById('tblCount').textContent=filtered.length+' clientes';

  // Ordenar — clientes do roteiro primeiro, depois por sortCol
  const sorted=[...filtered].sort((a,b)=>{
    // Roteiro primeiro se filtrando por data
    if(dataRot){
      if(a.data_rot&&!b.data_rot)return -1;
      if(!a.data_rot&&b.data_rot)return 1;
    }
    if(sortCol==='nome'){const va=a.nome,vb=b.nome;return sortAsc?(va<vb?-1:1):(va>vb?-1:1);}
    if(sortCol==='ultima_compra'){const va=a.ultima_compra||'',vb=b.ultima_compra||'';return sortAsc?(va<vb?-1:1):(va>vb?-1:1);}
    if(sortCol==='data_rot'){const va=a.data_rot||'',vb=b.data_rot||'';return sortAsc?(va<vb?-1:1):(va>vb?-1:1);}
    const va=(sortCol==='pot_real'?a.pot_real:a[sortCol])||0,vb=(sortCol==='pot_real'?b.pot_real:b[sortCol])||0;return sortAsc?va-vb:vb-va;
  });

  // Thead
  function th(col,lbl,num){
    const ico=sortCol===col?(sortAsc?'↑':'↓'):'↕';
    return `<th class="${num?'num':''}" onclick="setSort('${col}')">${lbl}<span class="sort-ico">${ico}</span></th>`;
  }
  const showEqCol=!eq||!rca;
  let hdrs=th('nome','Cliente')+th('ultima_compra','Últ. Compra')+th('data_rot','Roteiro');
  if(showEqCol)hdrs+=th('rca','Vendedor');
  hdrs+=th('pot_real','Potencial',true);
  cats.forEach(c=>hdrs+=`<th class="num">${c}</th>`);
  hdrs+=th('ult_total','Total Últ.',true)+th('ano_total','Total Ano',true);
  document.getElementById('thead').innerHTML=`<tr>${hdrs}</tr>`;

  const tbody=document.getElementById('tbody');
  if(!sorted.length){
    tbody.innerHTML='<tr><td colspan="15" class="empty">Nenhum cliente encontrado.</td></tr>';
    return;
  }

  const maxPot=Math.max(...sorted.map(d=>d.pot_real),1);

  tbody.innerHTML=sorted.map(d=>{
    const ultTot=calcUlt(d);
    const anoTot=calcAno(d);
    const pct=Math.round(d.pot_real/maxPot*80);
    const dtCls=d.ultima_compra&&parseInt((d.ultima_compra.split('/')||['0','0','0'])[2])>=2026?'val-green':'val-amber';
    const inRot=!!d.data_rot;
    const rowCls=inRot?' class="in-rot"':'';

    let cells=`
      <td>
        <div class="nome-cli" title="${d.nome}">${d.nome}</div>
        <div class="cod-cli">Cód. ${d.cli}${inRot?' <span class="rot-indicator">📍 Roteiro</span>':''}</div>
      </td>
      <td><span class="${dtCls}">${d.ultima_compra||'SEM HIST'}</span></td>
      <td>${inRot?`<span class="data-rot-badge">${d.data_rot}</span>${d.dia_rot?'<span class="dia-badge">'+diasSem(d.dia_rot)+'</span>':''}`:
        '<span style="font-size:10px;color:#D1D5DB">—</span>'}</td>`;
    if(showEqCol)cells+=`<td style="font-size:11px;color:#374151;max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.rca||'—'}</td>`;
    cells+=`<td class="num"><span style="font-weight:600">${fmtFull(d.pot_real)}</span><div style="height:3px;background:#E5E7EB;border-radius:2px;margin-top:4px"><div style="height:3px;border-radius:2px;background:#3B82F6;width:${pct}%"></div></div></td>`;
    cats.forEach(cat=>{
      const s=d.skus[cat];
      cells+=s&&s.ult>0?`<td class="num"><span class="pill ${pillClass(cat)}">${fmtFull(s.ult)}</span></td>`:'<td class="num" style="color:#E5E7EB">—</td>';
    });
    cells+=`<td class="num" style="font-weight:700">${fmtFull(ultTot)}</td>`;
    cells+=`<td class="num" style="color:#6B7280">${fmtFull(anoTot)}</td>`;
    return `<tr${rowCls}>${cells}</tr>`;
  }).join('');
}

function setSort(col){
  if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=false;}
  render();
}

// Init
buildEquipes();
setForn('2422');
</script></body></html>
