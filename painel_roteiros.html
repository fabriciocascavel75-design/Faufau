<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Painel de Roteiros</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F0F2F5;color:#1A1A2E;min-height:100vh}
header{background:#1A1A2E;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
header h1{font-size:17px;font-weight:600;color:#fff;display:flex;align-items:center;gap:10px}
header h1 em{background:#10B981;color:#fff;font-size:11px;font-weight:600;font-style:normal;padding:3px 10px;border-radius:20px}
.hdr-info{font-size:12px;color:#9CA3AF}
.hdr-info strong{color:#fff}
.filtros-bar{background:#fff;border-bottom:1px solid #E5E7EB;padding:12px 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.filtros-bar label{font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;display:flex;flex-direction:column;gap:4px;min-width:180px}
.filtros-bar select{font-size:13px;padding:7px 10px;border-radius:7px;border:1px solid #E5E7EB;background:#F9FAFB;color:#1A1A2E;cursor:pointer}
.filtros-bar select:disabled{opacity:.4;cursor:not-allowed}
.filtros-bar select:focus{outline:none;border-color:#10B981}
.btn-limpar{padding:7px 14px;font-size:12px;border-radius:7px;border:1px solid #E5E7EB;background:#fff;color:#6B7280;cursor:pointer;margin-left:auto;align-self:flex-end}
.btn-limpar:hover{background:#F3F4F6}
.cards-totais{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 24px}
.card-t{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #E5E7EB}
.card-t-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#9CA3AF;margin-bottom:4px}
.card-t-val{font-size:22px;font-weight:700;color:#1A1A2E}
.card-t-sub{font-size:11px;color:#9CA3AF;margin-top:2px}
.content{padding:0 24px 24px}
.sec-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#6B7280;margin-bottom:10px}
.tbl-wrap{background:#fff;border:1px solid #E5E7EB;border-radius:10px;overflow:hidden}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}
th{background:#F9FAFB;text-align:left;font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.5px;padding:9px 12px;border-bottom:1px solid #E5E7EB;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:#374151}
th.num,td.num{text-align:right}
td{padding:9px 12px;color:#374151;border-bottom:1px solid #F3F4F6;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAFA}
.nome-cli{font-weight:500;color:#1A1A2E;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cod-cli{font-size:10px;color:#9CA3AF}
.rca-txt{font-size:11px;color:#374151;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eq-txt{font-size:10px;color:#6B7280}
.data-txt{white-space:nowrap;font-size:12px;font-weight:500}
.dia-badge{font-size:10px;padding:2px 7px;border-radius:20px;background:#E0F2FE;color:#0369A1;font-weight:600;white-space:nowrap}
.curva-a{background:#D1FAE5;color:#065F46;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.curva-b{background:#FEF3C7;color:#92400E;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.curva-c{background:#FEE2E2;color:#991B1B;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.curva-x{background:#F3F4F6;color:#6B7280;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.ult-ok{color:#059669;font-size:11px}
.ult-warn{color:#D97706;font-size:11px}
.ult-vazio{color:#DC2626;font-size:11px}
.bar-pot{display:inline-block;height:4px;border-radius:2px;background:#10B981;margin-left:6px;vertical-align:middle;opacity:.7}
.pot-val{font-weight:600}
.empty{text-align:center;padding:40px;color:#9CA3AF;font-size:13px}
.sort-ico{opacity:.5;font-size:9px;margin-left:3px}
@media(max-width:700px){.cards-totais{grid-template-columns:repeat(2,1fr)}.filtros-bar{padding:12px 16px}.content,.cards-totais{padding-left:16px;padding-right:16px}}
</style>
</head>
<body>
<header>
  <h1>📍 Painel de Roteiros <em id="hdr-eq">Todas as equipes</em></h1>
  <div class="hdr-info">Clientes: <strong id="hdr-cnt">—</strong> &nbsp;|&nbsp; Potencial: <strong id="hdr-pot">—</strong></div>
</header>
<div class="filtros-bar">
  <label>Equipe
    <select id="selEq" onchange="onEq()">
      <option value="">Todas as equipes</option>
    </select>
  </label>
  <label>Vendedor (RCA)
    <select id="selRca" onchange="onRca()" disabled>
      <option value="">Todos os vendedores</option>
    </select>
  </label>
  <label>Data da visita
    <select id="selData" onchange="render()" disabled>
      <option value="">Todas as datas</option>
    </select>
  </label>
  <button class="btn-limpar" onclick="limpar()">✕ Limpar filtros</button>
</div>
<div class="cards-totais">
  <div class="card-t"><div class="card-t-lbl">Clientes</div><div class="card-t-val" id="c1">—</div><div class="card-t-sub" id="cs1"></div></div>
  <div class="card-t"><div class="card-t-lbl">Potencial total</div><div class="card-t-val" id="c2">—</div><div class="card-t-sub" id="cs2"></div></div>
  <div class="card-t"><div class="card-t-lbl">Curva A</div><div class="card-t-val" id="c3">—</div><div class="card-t-sub" id="cs3"></div></div>
  <div class="card-t"><div class="card-t-lbl">Previsibilidade média</div><div class="card-t-val" id="c4">—</div><div class="card-t-sub" id="cs4"></div></div>
</div>
<div class="content">
  <div class="sec-title" id="secTitle">Roteiro completo</div>
  <div class="tbl-wrap">
    <div class="tbl-scroll">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"><tr><td colspan="10" class="empty">Carregando...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

let sortCol='data', sortAsc=true;

(function init(){
  const equipes=[...new Set(DATA.map(d=>d.equipe).filter(Boolean))].sort();
  const sel=document.getElementById('selEq');
  equipes.forEach(e=>{const o=document.createElement('option');o.value=e;o.textContent=e;sel.appendChild(o);});
  render();
})();

function onEq(){
  const eq=document.getElementById('selEq').value;
  const selRca=document.getElementById('selRca');
  const rcas=[...new Set(DATA.filter(d=>!eq||d.equipe===eq).map(d=>d.rca2).filter(Boolean))].sort();
  selRca.innerHTML='<option value="">Todos os vendedores</option>';
  rcas.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;selRca.appendChild(o);});
  selRca.disabled=!eq;
  buildDataFilter();
  render();
}

function onRca(){buildDataFilter();render();}

function buildDataFilter(){
  const eq=document.getElementById('selEq').value;
  const rca=document.getElementById('selRca').value;
  const base=DATA.filter(d=>(!eq||d.equipe===eq)&&(!rca||d.rca2===rca));
  const datas=[...new Set(base.map(d=>d.data).filter(Boolean))].sort();
  const sel=document.getElementById('selData');
  const cur=sel.value;
  sel.innerHTML='<option value="">Todas as datas</option>';
  datas.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;if(d===cur)o.selected=true;sel.appendChild(o);});
  sel.disabled=datas.length===0;
}

function limpar(){
  document.getElementById('selEq').value='';
  document.getElementById('selRca').value='';
  document.getElementById('selRca').disabled=true;
  document.getElementById('selData').value='';
  document.getElementById('selData').disabled=true;
  render();
}

function getFiltrado(){
  const eq=document.getElementById('selEq').value;
  const rca=document.getElementById('selRca').value;
  const data=document.getElementById('selData').value;
  return DATA.filter(d=>{
    if(eq&&d.equipe!==eq)return false;
    if(rca&&d.rca2!==rca)return false;
    if(data&&d.data!==data)return false;
    return true;
  });
}

function fmtR(v){
  if(v>=1e6)return 'R$ '+(v/1e6).toFixed(1)+'M';
  if(v>=1e3)return 'R$ '+(v/1e3).toFixed(0)+'k';
  return 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtFull(v){return 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}

function curvaClass(c){
  if(c==='A')return 'curva-a';
  if(c==='B')return 'curva-b';
  if(c==='C')return 'curva-c';
  return 'curva-x';
}

function ultClass(s){
  if(!s||s==='SEM HIST')return 'ult-vazio';
  const parts=s.split('/');
  if(parts.length===3){
    const d=new Date(+parts[2],+parts[1]-1,+parts[0]);
    const diff=(new Date()-d)/(1000*60*60*24);
    return diff<=60?'ult-ok':diff<=120?'ult-warn':'ult-vazio';
  }
  return 'ult-vazio';
}

function diasSemana(d){const m={'seg':'SEG','ter':'TER','qua':'QUA','qui':'QUI','sex':'SEX','sab':'SÁB','dom':'DOM'};return m[d.toLowerCase()]||d.toUpperCase();}

  const curvC=fil.filter(d=>d.curva==='C').length;
  const prevVals=fil.map(d=>parseFloat(d.previs)).filter(v=>!isNaN(v)&&v>0);
  const prevMed=prevVals.length?prevVals.reduce((s,v)=>s+v,0)/prevVals.length:0;

  document.getElementById('c2').textContent=fmtR(totPot);
  document.getElementById('cs2').textContent=fmtFull(totPot);
  document.getElementById('c3').textContent=curvA;
  document.getElementById('cs3').textContent=`B: ${curvB} | C: ${curvC}`;
  document.getElementById('c4').textContent=(prevMed*100).toFixed(0)+'%';
  document.getElementById('cs4').textContent='previsibilidade de compra';
  document.getElementById('hdr-cnt').textContent=fil.length;
  document.getElementById('hdr-pot').textContent=fmtFull(totPot);

  // Title
  let t='Roteiro completo';
  if(eq)t=eq;
  if(rca)t+=' › '+rca;
  if(dataFil)t+=' · '+dataFil;
  document.getElementById('secTitle').textContent=t;

  // Thead
  const showRca=!rca;
  const showEq=!eq;
  function th(col,lbl,num){
    const ico=sortCol===col?(sortAsc?'↑':'↓'):'↕';
    return `<th class="${num?'num':''}" onclick="setSort('${col}')">${lbl}<span class="sort-ico">${ico}</span></th>`;
  }
  let hdrs=th('fantasia','Cliente')+th('data','Data visita')+th('dia','Dia');
  if(showRca)hdrs+=th('rca2','Vendedor');
  if(showEq)hdrs+=th('equipe','Equipe');
  hdrs+=th('pot','Potencial',true)+th('ult_compra','Últ. Compra')+th('curva','Curva')+th('city','Cidade')+th('tel','Telefone');
  document.getElementById('thead').innerHTML=`<tr>${hdrs}</tr>`;

  // Sort
  const sorted=[...fil].sort((a,b)=>{
    let va=a[sortCol]||'', vb=b[sortCol]||'';
    if(sortCol==='pot'){va=a.pot;vb=b.pot;return sortAsc?va-vb:vb-va;}
    return sortAsc?(va<vb?-1:va>vb?1:0):(va>vb?-1:va<vb?1:0);
  });

  const maxPot=Math.max(...fil.map(d=>d.pot),1);
  const tbody=document.getElementById('tbody');

  if(!sorted.length){
    tbody.innerHTML='<tr><td colspan="10" class="empty">Nenhum cliente encontrado para os filtros selecionados.</td></tr>';
    return;
  }

  tbody.innerHTML=sorted.map(d=>{
    const barW=Math.round(d.pot/maxPot*80);
    const nome=d.fantasia||d.razao||'—';
    const uc=ultClass(d.ult_compra);
    let cells=`
      <td><div class="nome-cli" title="${d.razao}">${nome}</div><div class="cod-cli">Cód. ${d.codcli}</div></td>
      <td class="data-txt">${d.data||'—'}</td>
      <td>${d.dia?`<span class="dia-badge">${diasSemana(d.dia)}</span>`:''}</td>`;
    if(showRca)cells+=`<td><div class="rca-txt">${d.rca2||'—'}</div></td>`;
    if(showEq)cells+=`<td><div class="eq-txt">${d.equipe||'—'}</div></td>`;
    cells+=`
      <td class="num"><span class="pot-val">${fmtFull(d.pot)}</span><span class="bar-pot" style="width:${barW}px"></span></td>
      <td><span class="${uc}">${d.ult_compra||'SEM HIST'}</span></td>
      <td><span class="${curvaClass(d.curva)}">${d.curva||'—'}</span></td>
      <td style="font-size:11px;color:#6B7280;white-space:nowrap">${d.cidade||'—'}</td>
      <td style="font-size:11px;white-space:nowrap">${d.tel||'—'}</td>`;
    return `<tr>${cells}</tr>`;
  }).join('');
}

function setSort(col){
  if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=true;}
  render();
}
</script></body></html>
